<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BDKI App Main</title>
    <style>
        /* 기본 설정: 여백 제거 및 스크롤 방지 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden; /* 모바일 앱처럼 보이기 위해 스크롤 막음 */
            background-color: #000; /* 배경 로딩 전 공백 방지 */
        }

        /* 1. 배경화면 설정 */
        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('https://bdki2020.cafe24.com/app/bg26040801.png');
            background-size: cover; /* 화면에 꽉 차게 */
            background-position: center;
            background-repeat: no-repeat;
        }

        /* 로고 공통 스타일 */
        .logo-link {
            position: absolute;
            display: block;
        }

        .logo-link img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        /* --------------------------------------------------
           [수정 구간] 아이콘의 위치(x, y)와 크기를 px로 설정하세요
           -------------------------------------------------- */

        /* 2. 상단 블랙 로고 (홈페이지 연결) */
        .logo-top {
            /* 위치 설정 (x: left, y: top) */
            left: 50px;       /* x 좌표 */
            top: 150px;       /* y 좌표 */
            
            /* 크기 설정 */
            width: 35px;     /* 가로 크기 */
            height: 32px;     /* 세로 크기 */
        }

        /* 3. 하단 화이트 로고 (블로그 연결) */
        .logo-bottom {
            /* 위치 설정 (x: left, y: top) */
            left: 50px;       /* x 좌표 */
            top: 500px;       /* y 좌표 (예시) */
            
            /* 크기 설정 */
            width: 35px;     /* 가로 크기 */
            height: 32px;     /* 세로 크기 */
        }

        /* 터치 시 피드백 (선택 사항) */
        .logo-link:active {
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <a href="https://bdki.co.kr/" class="logo-link logo-top"><img src="https://bdki2020.cafe24.com/app/logo_bk.png" alt="BDKI Home"></a>

        <a href="https://blog.naver.com/bdki_blog" class="logo-link logo-bottom"><img src="https://bdki2020.cafe24.com/app/logo_wh.png" alt="BDKI Blog"></a>
    </div>

</body>
</html>
