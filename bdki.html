<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BDKI App Main</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('https://bdki2020.cafe24.com/app/260424/main.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;        
            
            /* 기본 하단 여백 */
            padding-bottom: 120px; 
        }

        /* [iOS 전용 설정] - 버튼 크기 200px 유지 */
        body.ios .app-container {
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
        }
        body.ios .logo-link {
            width: 200px;
        }

        /* [안드로이드/갤럭시 전용 설정] - 버튼 크기 20% 확대 및 위치 20px 위로 이동 */
        body.android .app-container {
            /* 기존 120px에서 20px을 더해 140px로 설정 (위로 밀어올림) */
            padding-bottom: 140px; 
        }
        body.android .logo-link {
            width: 240px; /* 기존 200px 대비 20% 확대 */
        }

        .button-group {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            align-items: center;
            width: 100%;
        }

        .logo-link {
            display: block;
            height: auto;
            transition: transform 0.1s, opacity 0.1s;
        }

        .logo-link img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
        }

        .logo-link:active {
            opacity: 0.8;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="button-group">
            <a href="https://www.bdki.co.kr/" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260424/website.png" alt="BDKI Home">
            </a>

            <a href="https://www.bdkibuy.co.kr/" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260424/shop.png" alt="BDKI Shop">
            </a>

            <a href="https://blog.naver.com/bdki_blog" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260424/blog.png" alt="BDKI Blog">
            </a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            
            // 기기 판별 후 body에 클래스 부여
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.body.classList.add('ios');
            } else {
                document.body.classList.add('android');
            }
        });
    </script>
</body>
</html>
