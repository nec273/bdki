<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BDKI App Main</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('https://bdki2020.cafe24.com/app/260416/approot.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;        
            
            /* [기본: 안드로이드] 기존처럼 여백을 넉넉히 줌 */
            padding-bottom: 150px; 
        }

        /* [iOS 전용 설정] 버튼을 더 아래로 내려서 로고와 겹침 방지 */
        body.ios .app-container {
            padding-bottom: 80px; /* 150px에서 60px로 줄여서 버튼을 하단으로 내림 */
            padding-bottom: calc(40px + env(safe-area-inset-bottom)); /* 홈 바 영역 대응 */
        }

        .button-group {
            display: flex;
            flex-direction: column; 
            gap: 25px; 
            align-items: center;
            width: 100%;
        }

        .logo-link {
            display: block;
            width: 200px; 
            height: auto;
            transition: transform 0.1s;
        }

        .logo-link img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        .logo-link:active {
            opacity: 0.8;
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="button-group">
            <a href="https://bdki.co.kr/" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/website.png" alt="BDKI Home">
            </a>

            <a href="https://blog.naver.com/bdki_blog" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/blog.png" alt="BDKI Blog">
            </a>
        </div>
    </div>

    <script>
        // 접속 기기가 iOS인지 감지해서 body에 클래스를 붙여줍니다.
        document.addEventListener("DOMContentLoaded", function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.body.classList.add('ios');
            } else {
                document.body.classList.add('android');
            }
        });
    </script>
</body>
</html>
