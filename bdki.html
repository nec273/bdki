<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>BDKI App Main</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('https://bdki2020.cafe24.com/app/260416/approot.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;        
            
            /* [안드로이드] 하단 여백 */
            padding-bottom: 120px; 
        }

        /* [iOS] 기존보다 30px 위로 올림 (30px -> 60px) */
        body.ios .app-container {
            padding-bottom: calc(100px + env(safe-area-inset-bottom)); 
        }

        .button-group {
            display: flex;
            flex-direction: column; 
            gap: 15px; 
            align-items: center;
            width: 100%;
        }

        .logo-link {
            display: block;
            width: 200px; /* 슬림한 틀 유지 */
            height: auto;
            transition: transform 0.1s;
        }

        .logo-link img {
            width: 100%;
            height: auto;
            display: block;
            filter: drop-shadow(0px 4px 6px rgba(0,0,0,0.4));
        }

        .logo-link:active {
            opacity: 0.8;
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="button-group">
            <a href="https://bdki.co.kr/" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/website.png" alt="BDKI Home">
            </a>

            <a href="https://blog.naver.com/bdki_blog" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/blog.png" alt="BDKI Blog">
            </a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            var userAgent = navigator.userAgent || navigator.vendor || window.opera;
            if (/iPad|iPhone|iPod/.test(userAgent) && !window.MSStream) {
                document.body.classList.add('ios');
            } else {
                document.body.classList.add('android');
            }
        });
    </script>
</body>
</html>
