<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BDKI App Main</title>
    <style>
        /* 기본 설정 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* 1. 배경화면 설정 */
        .app-container {
            position: relative;
            width: 100%;
            height: 100vh;
            background-image: url('https://bdki2020.cafe24.com/app/260416/approot.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            
            /* 하단 중앙 배치를 위한 설정 */
            display: flex;
            flex-direction: column;
            justify-content: flex-end; 
            align-items: center;       
            padding-bottom: 250px;      /* 삼성 하단 바를 고려해 여백을 80px로 키움 */
        }

        /* 버튼 그룹 */
        .button-group {
            display: flex;
            flex-direction: column; 
            gap: 25px;             /* 아이콘 사이 간격을 시원하게 벌림 */
            align-items: center;
            width: 100%;           /* 중앙 정렬 보장 */
        }

        /* [수정] 아이콘 스타일 - 크기를 대폭 키움 */
        .logo-link {
            display: block;
            width: 750px;          /* 기존 120px -> 180px로 확대 (더 키우려면 200px 추천) */
            height: auto;
            transition: transform 0.1s;
        }

        .logo-link img {
            width: 100%;
            height: auto;
            display: block;
            /* 이미지 외곽에 미세한 그림자를 주어 가독성을 높임 (선택 사항) */
            filter: drop-shadow(0px 4px 8px rgba(0,0,0,0.5));
        }

        /* 터치 시 피드백 (삼성 햅틱 반응과 어울리게 살짝만) */
        .logo-link:active {
            opacity: 0.8;
            transform: scale(0.92);
        }
    </style>
</head>
<body>

    <div class="app-container">
        <div class="button-group">
            <a href="https://bdki.co.kr/" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/website.png" alt="BDKI Home">
            </a>

            <a href="https://blog.naver.com/bdki_blog" class="logo-link">
                <img src="https://bdki2020.cafe24.com/app/260416/blog.png" alt="BDKI Blog">
            </a>
        </div>
    </div>

</body>
</html>
